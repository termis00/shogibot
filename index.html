<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>将棋キャラクター対局</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div class="dialogue-panel" id="dialogue-panel">
      <div class="dialogue-header">
        <span id="char-name" class="char-name">竜王</span>
        <button id="btn-settings" class="btn-icon" title="LLM設定">&#9881;</button>
      </div>
      <div id="dialogue-bubble" class="dialogue-bubble">
        <span class="dialogue-text" id="dialogue-text">LLMを設定すると、キャラクターが対局中に喋ります。</span>
        <span class="dialogue-stats" id="dialogue-stats"></span>
      </div>
      <div class="char-select">
        <select id="char-select">
          <option value="ryuou">竜王</option>
          <option value="miko">巫女棋士</option>
          <option value="kenshi">剣士</option>
        </select>
        <select id="lang-select" class="lang-select">
          <option value="ko">한국어</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>

    <div class="game-container">
      <div id="label-top" class="hand-label">☖ 後手</div>
      <div id="hand-top"></div>

      <div class="board-container">
        <div id="board"></div>
      </div>

      <div id="hand-bottom"></div>
      <div id="label-bottom" class="hand-label">☗ 先手</div>
    </div>

    <div class="game-info">
      <div id="turn-indicator" class="turn-indicator">先手の番</div>
      <div id="move-count" class="move-count">0手目</div>
      <div id="game-status" class="game-status"></div>
      <div class="eval-container">
        <div id="eval-bar" class="eval-bar"><span id="eval-text" class="eval-text">0</span></div>
      </div>
      <div class="engine-controls">
        <button id="btn-vs-engine" disabled>CPU対局</button>
        <label class="level-label">
          Lv.<span id="level-display">10</span>
          <input id="engine-level" type="range" min="0" max="20" value="10">
        </label>
      </div>
      <div class="controls">
        <button id="btn-reset">最初から</button>
        <button id="btn-flip">盤面反転</button>
      </div>
      <div id="move-list" class="move-list"></div>
    </div>
  </div>

  <!-- LLM Settings Modal -->
  <div id="settings-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>LLM設定</h3>
      <div class="form-group">
        <label>プロバイダー</label>
        <select id="llm-type">
          <option value="claude">Claude API</option>
          <option value="openai">OpenAI互換 (Ollama Cloud / Vercel AI GW等)</option>
        </select>
      </div>
      <div class="form-group">
        <label>エンドポイント</label>
        <input id="llm-endpoint" type="text" placeholder="https://api.anthropic.com">
      </div>
      <div class="form-group">
        <label>APIキー</label>
        <input id="llm-apikey" type="password" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>モデル名</label>
        <input id="llm-model" type="text" placeholder="claude-sonnet-4-20250514">
      </div>
      <div class="modal-actions">
        <button id="btn-test-llm">接続テスト</button>
        <button id="btn-save-llm">保存</button>
        <button id="btn-close-modal">閉じる</button>
      </div>
      <div id="llm-status" class="llm-status"></div>
    </div>
  </div>

  <script src="/lib/stockfish.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
